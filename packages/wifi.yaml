### packages/wifi.yaml
### WiFi-Konfiguration mit NeoPixel-Statusanzeige
### on_connect → grün | on_disconnect → amber

wifi:
  ap:
    ssid: "ESPHome-BLEProxy"    # Fallback-AP wenn kein WLAN verfügbar

  on_connect:
    then:
      - light.turn_on:
          id: neopixel_status
          red: 0%
          green: 100%
          blue: 0%
          brightness: 30%

  on_disconnect:
    then:
      - light.turn_on:
          id: neopixel_status
          red: 100%
          green: 60%
          blue: 0%
          brightness: 30%
