### packages/base.yaml
### Gemeinsame Basis: ESP32-C6, BLE-Proxy, NeoPixel-Strip, Buttons, API, OTA
### Wird von beiden Gerätevarianten eingebunden.

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

esphome:
  on_boot:
    priority: -100          # Status-LED leuchtet amber während Boot
    then:
      - light.turn_on:
          id: neopixel_status
          red: 100%
          green: 60%
          blue: 0%
          brightness: 50%

logger:
  level: VERY_VERBOSE
  logs:
    bluetooth_proxy: VERY_VERBOSE
    esp32_ble_tracker: VERY_VERBOSE
    i2c.idf: NONE
    bme68x_bsec2.sensor: NONE
    bme68x_bsec2_i2c.sensor: NONE
    text_sensor: NONE
    sensor: NONE
    esp32_rmt_led_strip: NONE
    light.addressable: NONE
    light: NONE
    component: NONE
    sensor.filter: NONE

api:

ota:
  - platform: esphome
    id: ota_esphome

web_server:
  version: 3
  port: 80

captive_portal:

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot

  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset

light:
  # Physischer NeoPixel-Strip – 2 LEDs, intern
  - platform: esp32_rmt_led_strip
    id: neopixel_strip
    rgb_order: GRB
    pin: GPIO1
    num_leds: 2
    chipset: ws2812
    internal: true

  # LED 1 – WiFi-/System-Status
  - platform: partition
    id: neopixel_status
    name: "Status LED"
    internal: true
    segments:
      - id: neopixel_strip
        from: 1
        to: 1
